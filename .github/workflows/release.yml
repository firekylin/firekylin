name: Release

on:
  push:
    branches:
      - master

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version_changed
        run: |
          if git diff HEAD~1 HEAD -- package.json | grep -q '"version"'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Get package.json version
        id: pkg_version
        if: steps.version_changed.outputs.changed == 'true'
        run: echo "VERSION=$(node -e "console.log(require('./package.json').version)")" >> $GITHUB_OUTPUT

      - name: Get latest released version
        id: latest_version
        if: steps.version_changed.outputs.changed == 'true'
        run: |
          LATEST=$(curl -sf https://raw.githubusercontent.com/firekylin/firekylin.org/master/www/release/v1/.latest || echo "0.0.0")
          echo "LATEST=$LATEST" >> $GITHUB_OUTPUT

      - name: Compare versions and decide release
        id: check
        if: steps.version_changed.outputs.changed == 'true'
        run: |
          PKG_VERSION="${{ steps.pkg_version.outputs.VERSION }}"
          LATEST_VERSION="${{ steps.latest_version.outputs.LATEST }}"
          IS_NEWER=$(node -e "
            function gt(a, b) {
              const pa = a.split('.').map(Number);
              const pb = b.split('.').map(Number);
              for (let i = 0; i < 3; i++) {
                if (pa[i] > pb[i]) return true;
                if (pa[i] < pb[i]) return false;
              }
              return false;
            }
            console.log(gt('$PKG_VERSION', '$LATEST_VERSION') ? 'true' : 'false');
          ")
          echo "should_release=$IS_NEWER" >> $GITHUB_OUTPUT
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT

  build-and-release:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm i

      - name: Write version file
        run: echo "${{ needs.check-version.outputs.version }}" > .version

      - name: Build
        run: sh bin/build.sh

      - name: Checkout firekylin.org
        uses: actions/checkout@v4
        with:
          repository: firekylin/firekylin.org
          token: ${{ secrets.RELEASE_TOKEN }}
          path: firekylin.org

      - name: Update release files
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          cp build/firekylin_${VERSION}.tar.gz firekylin.org/www/release/v1/latest.tar.gz
          echo "$VERSION" > firekylin.org/www/release/v1/.latest

      - name: Commit and push to firekylin.org
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          cd firekylin.org
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add www/release/v1/latest.tar.gz www/release/v1/.latest
          git commit -m "Release v${VERSION}"
          git push
