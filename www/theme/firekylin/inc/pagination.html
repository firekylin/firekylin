<nav class="pagination">
  <% if (pagination.currentPage > 1) { %>
    <% const prev = pagination.currentPage - 1; %>
    <a href="<%= pagination(prev, ctx.url) %>" class="prev">&laquo; 上一页</a>
  <% } %>

  <% if (pagination.currentPage < pagination.totalPages) { %>
    <% const next = pagination.currentPage + 1; %>
    <a href="<%= pagination(next, ctx.url) %>" class="next">下一页 &raquo;</a>
  <% } %>

  <div class="center"><a href="/archives">博客归档</a></div>
</nav>
